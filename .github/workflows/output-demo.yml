name: Deploy website - Output data
on:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
        script: ${{steps.publish.outputs.name}}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Get JS file name
        id: publish
        run : find dist/*/*.js -type f -execdir echo 'name={}' >> $GITHUB_OUTPUT ';'
      - name: Upload-Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: output contents
        run: |
         ls -lrt
         date
         hostname
      - name: ouput js file name
        run: echo "${{needs.build.outputs.script}}" 

      - name: Deploy
        run: echo "Deploying..."
